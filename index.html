<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Fukidashi Web Tool</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Manga Fukidashi Web Tool</h1>
    </header>
    <main>
        <section id="manga-input">
            <h2>Input Manga Data</h2>
            <form id="manga-form">
                <label for="manga-title">Title:</label>
                <input type="text" id="manga-title" name="manga-title" required>
                <label for="manga-chapters">Chapters:</label>
                <input type="number" id="manga-chapters" name="manga-chapters" required>
                <button type="submit">Submit</button>
            </form>
        </section>
        <section id="manga-display">
            <h2>Manga Display</h2>
            <div id="manga-list"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
