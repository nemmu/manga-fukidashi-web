<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マンガ吹き出し文字合成ツール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@900&family=Bangers&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="header">
  <h1>マンガ吹き出し文字合成</h1>
  <span class="badge">Bubble Composer</span>
</div>
<div class="layout">
  <div class="panel">
    <div class="section-label">入力</div>
    <div class="field">
      <label>PNG 画像（複数選択可）</label>
      <input type="file" id="pngInput" accept="image/png,image/*" multiple>
      <div class="file-list" id="fileList"></div>
    </div>
    <div class="field">
      <label>テキスト JSON（貼り付け）</label>
      <textarea id="jsonText" placeholder='{"pages":[{"page":1,"bubbles":[]},{"page":2,"bubbles":[{"id":"1","ja":"...","en":"...","id_lang":"...","zh_tw":"..."}]}]}'></textarea>
      <div class="json-status" id="jsonStatus"></div>
      <div class="hint">pagesフォーマット。bubbles:[]のページはスキップ。1枚目は全言語横書き固定。</div>
    </div>
    <div class="field">
      <label>出力言語（複数選択）</label>
      <div class="lang-grid">
        <label class="lang-check"><input type="checkbox" id="lang_ja" checked><span>日本語</span><span class="lang-tag">ja</span></label>
        <label class="lang-check"><input type="checkbox" id="lang_en" checked><span>English</span><span class="lang-tag">en</span></label>
        <label class="lang-check"><input type="checkbox" id="lang_zh_tw" checked><span>中文</span><span class="lang-tag">zh_tw</span></label>
        <label class="lang-check"><input type="checkbox" id="lang_id_lang" checked><span>Indonesia</span><span class="lang-tag">id_lang</span></label>
      </div>
    </div>
    <div class="field">
      <label>吹き出しカラーコード</label>
      <div class="color-row">
        <input type="color" id="colorPicker" value="#ff00ac">
        <input type="text" id="colorHex" value="#ff00ac" placeholder="#rrggbb" maxlength="7">
      </div>
    </div>
    <hr>
    <details>
      <summary>▸ 詳細設定</summary>
      <div class="details-body">
        <div class="field">
          <label>膨張px（アンチエイリアス対策）</label>
          <div class="range-row">
            <input type="range" id="dilate" min="0" max="10" value="2">
            <span class="range-val" id="dilateVal">2px</span>
          </div>
        </div>
        <div class="field">
          <label>文字サイズ倍率</label>
          <div class="range-row">
            <input type="range" id="fontScale" min="50" max="150" value="100">
            <span class="range-val" id="fontScaleVal">100%</span>
          </div>
        </div>
        <div class="field">
          <label>色の許容誤差</label>
          <div class="range-row">
            <input type="range" id="tolerance" min="0" max="100" value="30">
            <span class="range-val" id="toleranceVal">30</span>
          </div>
        </div>
        <div class="field">
          <label>読み順</label>
          <select id="sortOrder">
            <option value="manga">漫画順（右→左、上→下）</option>
            <option value="normal">通常順（左→右、上→下）</option>
          </select>
        </div>
        <div class="field">
          <label>テキストカラー</label>
          <input type="color" id="textColor" value="#000000">
        </div>
        <div class="field">
          <label>最小吹き出し面積 (px²)</label>
          <input type="text" id="minArea" value="500">
        </div>
      </div>
    </details>
    <button class="btn btn-primary" id="composeBtn" disabled>① 合成する</button>
    <button class="btn btn-success" id="downloadBtn" disabled>② ZIP ダウンロード</button>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel"></div>
    </div>
    <div id="status">画像と JSON を入力してください</div>
  </div>

  <div class="panel preview-panel" id="previewPanel">
    <div class="preview-placeholder" id="placeholder">画像を読み込んで<br>合成ボタンを押してください</div>
  </div>
</div>
<canvas id="canvas"></canvas>

<script src="image.js"></script>
<script src="app.js"></script>

</body>
</html>
