<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fukidashi Web Tool</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #imageInput { margin: 10px; }
        #textInput { margin: 10px; }
        #download { display: none; }
    </style>
</head>
<body>
    <h1>Fukidashi Web Tool</h1>
    <input type="file" id="imageInput" accept="image/*">
    <input type="text" id="textInput" placeholder="Enter your text here..."></input>
    <button id="processButton">Process</button>
    <a id="download" download="fukidashi.png">Download</a>
    <canvas id="canvas" style="display:none;"></canvas>
    <script>
        document.getElementById('processButton').addEventListener('click', function() {
            const imageInput = document.getElementById('imageInput');
            const textInput = document.getElementById('textInput');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            const img = new Image();
            img.src = URL.createObjectURL(imageInput.files[0]);

            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                ctx.font = '30px Arial';
                ctx.fillStyle = 'white';
                ctx.fillText(textInput.value, 50, 50);
                const downloadButton = document.getElementById('download');
                downloadButton.href = canvas.toDataURL();
                downloadButton.style.display = 'block';
            };
        });
    </script>
</body>
</html>
